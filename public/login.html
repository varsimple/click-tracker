<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Войти — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e0e0e0;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.02) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.box{background:#101010;border:1px solid #1f1f1f;padding:40px;width:100%;max-width:380px;position:relative;z-index:1}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#00ff88}
.logo{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;margin-bottom:32px;text-align:center}
.logo span{color:#00ff88}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#444}
input{background:#080808;border:1px solid #1f1f1f;color:#e0e0e0;font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 14px;outline:none;transition:border-color .15s;width:100%}
input:focus{border-color:#00ff88}
button{background:#00ff88;color:#000;border:none;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:12px;cursor:pointer;width:100%;margin-top:8px;transition:opacity .15s}
button:hover{opacity:.85}
.err{background:rgba(255,51,85,.08);color:#ff3355;border-left:2px solid #ff3355;padding:8px 12px;font-size:11px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">TRK<span>.</span>KR</div>
  <div class="field"><label>Логин</label><input type="text" id="login" placeholder="залупа" autofocus></div>
  <div class="field"><label>Пароль</label><input type="password" id="password" placeholder="••••••"></div>
  <button onclick="doLogin()">Войти</button>
  <div class="err" id="err">Неверный логин или пароль</div>
</div>
<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
async function doLogin() {
  const login = document.getElementById('login').value
  const password = document.getElementById('password').value
  const r = await fetch('/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password})})
  if (r.ok) window.location.href = '/'
  else document.getElementById('err').style.display = 'block'
}
</script>
</body>
</html>
